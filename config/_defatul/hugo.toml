  name       = "Series"
  url        = "/series/"
  weight     = 20

[[menus.main]]
  identifier = "categories"
  name       = "Categorias"
  url        = "/categories/"
  weight     = 30

[[menus.main]]
  identifier = "tags"
  name       = "Tags"
  url        = "/tags/"
  weight     = 40

[[menus.main]]
  identifier = "arquivo"
  name       = "Arquivo"
  url        = "/archives/"
  weight     = 50

[[menus.main]]
