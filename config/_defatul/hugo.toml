# ==============================================================================
# BORTO.LOG — hugo.toml
# ==============================================================================

# baseURL = "https://bortoloso.me/"
title   = "Borto.log"
theme   = "PaperMod"

# Idioma principal do site
defaultContentLanguage = "pt"
languageCode           = "pt-BR"

# Paginação — posts por página nas listagens
[pagination]
  pagerSize = 10

# Não publicar rascunhos, posts futuros ou expirados em produção
buildDrafts  = false
buildFuture  = false
buildExpired = false

# Gera /robots.txt automaticamente (necessário para SEO)
enableRobotsTXT = true

# Gera permalinks com trailing slash — consistência com Cloudflare Pages
# e evita redirects desnecessários
canonifyURLs = false

# Não copiar arquivos de tema para o diretório de saída (melhor performance)
# Necessário quando o tema é usado como submódulo
enableGitInfo = false

# Extensões Markdown habilitadas
[markup.goldmark.renderer]
  # Permite HTML inline no Markdown (necessário para alguns shortcodes)
  unsafe = false

[markup.goldmark.extensions]
  # Ativa tabelas, strikethrough e outros extras do GitHub Flavored Markdown
  definitionList = true
  footnote       = true
  linkify        = true
  strikethrough  = true
  table          = true
  taskList       = true
  typographer    = true  # converte "..." em … e "--" em —

# Syntax highlighting via Chroma (nativo do Hugo, sem JS extra)
# pygmentsUseClasses obrigatório para o PaperMod controlar as cores via CSS
pygmentsUseClasses = true

[markup.highlight]
  noClasses      = false   # deve ser false quando pygmentsUseClasses = true
  codeFences     = true    # habilita blocos ```codigo```
  guessSyntax    = true    # tenta detectar a linguagem automaticamente
  lineNos        = false   # números de linha — descomentar para ativar
  # lineNumbersInTable = true  # números de linha em tabela separada (mais bonito)
  # anchorLineNos = true       # linhas clicáveis via âncora (#L42)
  # style = "monokai"          # ignorado quando noClasses=false; PaperMod controla as cores

# Minificação do output — reduz tamanho do HTML/CSS/JS gerado
[minify]
  disableXML    = true   # não minifica XML — evita quebrar o feed RSS
  minifyOutput  = true

# ------------------------------------------------------------------------------
# OUTPUTS — necessário para busca (JSON) e RSS
# ------------------------------------------------------------------------------
[outputs]
  home    = ["HTML", "RSS", "JSON"]  # JSON obrigatório para o Fuse.js funcionar
  section = ["HTML", "RSS"]
  # page  = ["HTML"]                 # padrão, não precisa declarar

# ------------------------------------------------------------------------------
# TAXONOMIAS
# ------------------------------------------------------------------------------
[taxonomies]
  tag      = "tags"
  category = "categories"
  series   = "series"

# ------------------------------------------------------------------------------
# PARÂMETROS DO PAPERMOD
# ------------------------------------------------------------------------------
[params]
  # Ambiente — ativa OpenGraph, Twitter Cards, Schema.org e Google Analytics
  # OBRIGATÓRIO para meta tags de redes sociais funcionarem
  # env = "production"

  # Descrição padrão do site (usada como og:description nas páginas sem descrição própria)
  description = "Blog sobre tecnologia, desenvolvimento e infraestrutura."

  # Autor padrão — pode ser sobrescrito por post no front matter
  author = "Borto"
  # author = ["Borto", "Outro"]  # múltiplos autores

  # Imagem padrão para preview em redes sociais (og:image / Twitter Card)
  # Arquivo em /static/images/cover.png
  images = ["images/cover.png"]

  # Formato de exibição de datas
  # Hugo usa a data de referência "Mon Jan 2 15:04:05 MST 2006" como base
  DateFormat = "2 de January de 2006"

  # Tema: "auto" segue preferência do OS | "dark" | "light"
  defaultTheme    = "auto"
  # disableThemeToggle = true  # remove o botão de alternar tema (forçar um lado)

  # ---- Metadados e leitura ------------------------------------------------
  ShowReadingTime   = true   # tempo estimado de leitura
  ShowWordCount     = true   # contagem de palavras
  ShowPostNavLinks  = true   # botões anterior/próximo no rodapé do post
  ShowBreadCrumbs   = true   # trilha de navegação (Home › Posts › Título)
  hidemeta          = false  # esconde bloco de metadados (autor, data, leitura)
  hideSummary       = false  # esconde resumo na listagem

  # ---- Código -------------------------------------------------------------
  ShowCodeCopyButtons = true  # botão copiar em blocos de código

  # ---- Compartilhamento e RSS ---------------------------------------------
  ShowShareButtons             = false  # botões de share (X, LinkedIn etc.)
  ShowRssButtonInSectionTermList = true # ícone RSS nas páginas de taxonomia

  # ---- Índice do post (Table of Contents) ---------------------------------
  # Pode ser sobrescrito por post via front matter: "showtoc: true"
  showtoc   = false  # exibir ToC por padrão nos posts
  tocopen   = false  # começar expandido ou colapsado
  UseHugoToc = true  # usa ToC nativo do Hugo (mais confiável que o do PaperMod)

  # ---- Rolagem e UX -------------------------------------------------------
  disableScrollToTop  = false  # botão "voltar ao topo"
  # disableSpecial1stPost = false  # true = remove destaque do primeiro post na home

  # ---- Comentários --------------------------------------------------------
  # Requer configuração de um provider externo
  comments = true
  [params.giscus]
    repo = "bortoloso/bortolog"
    repoId = "R_kgDOSet8pA"
    category = "Blog Comments"
    categoryId = "DIC_kwDOSet8pM4C9LyN"
    mapping = "pathname"
    strict = "0"
    reactionsEnabled = "1"
    emitMetadata = "0"
    inputPosition = "bottom"
    theme = "light"
    lang = "pt"
    loading = "lazy"

  # ---- Link "sugerir edição" no rodapé do post ----------------------------
  # Com appendFilePath=true, gera link direto para editar o arquivo no GitHub
  [params.editPost]
    URL            = "https://github.com/bortoloso/bortolog/blob/main/content"
    Text           = "Sugerir edição"
    appendFilePath = true

# ---- Capa dos posts -------------------------------------------------------
[params.cover]
  # hidden = true mantém og:image para redes sociais sem exibir na UI
  hidden         = true   # esconde em todas as páginas (mas mantém nos dados estruturados)
  hiddenInList   = true   # esconde na listagem e home
  hiddenInSingle = false  # exibe dentro do post individual
  responsiveImages = true  # gera versões responsivas da capa (requer Hugo Extended)

# ---- Página inicial — bloco de boas-vindas --------------------------------
[params.homeInfoParams]
  Title   = "Borto.log"
  Content = "Notas sobre tecnologia, desenvolvimento e infraestrutura."

# ---- Ícones sociais -------------------------------------------------------
# Lista completa: https://adityatelange.github.io/hugo-PaperMod/posts/papermod/papermod-icons/
[[params.socialIcons]]
  name = "github"
  url  = "https://github.com/bortoloso"

[[params.socialIcons]]
  name = "linkedin"
  url  = "https://linkedin.com/in/adilson-bortoloso"

[[params.socialIcons]]
  name = "rss"
  url  = "/index.xml"

# ---- Favicons -------------------------------------------------------------
# Gerar todos os tamanhos em: realfavicongenerator.net ou favicon.io/favicon-generator/
# Colocar os arquivos em /static/ e ajustar os caminhos abaixo
[params.assets]
  disableHLJS = true  # desativa highlight.js — usa Chroma nativo (mais rápido)
  # disableFingerprinting = false  # true = desativa cache busting nos assets

  favicon            = "/favicon.ico"
  favicon16x16       = "/favicon-16x16.png"
  favicon32x32       = "/favicon-32x32.png"
  apple_touch_icon   = "/apple-touch-icon.png"
  safari_pinned_tab  = "/safari-pinned-tab.svg"

# ---- Logo / label no header -----------------------------------------------
[params.label]
  text = "Borto.log"
  icon = "/apple-touch-icon.png"
  iconHeight = 35

# ---- Busca — Fuse.js -------------------------------------------------------
# Documentação completa: https://fusejs.io/api/options.html
[params.fuseOpts]
  isCaseSensitive = false
  shouldSort      = true
  location        = 0
  distance        = 1000       # busca no conteúdo completo do post
  threshold       = 0.4        # tolerância a erros — 0.0=exato, 1.0=qualquer coisa
  minMatchCharLength = 2       # mínimo de caracteres para retornar resultado
  limit           = 10         # máximo de resultados
  keys = ["title", "permalink", "summary", "content"]

# ---- Analytics (verificação de propriedade — Search Console) ---------------
# [params.analytics.google]
#   SiteVerificationTag = "XXXX"

